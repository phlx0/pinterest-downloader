name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Build
        run: web-ext build --artifacts-dir dist

      - name: Sign and submit to AMO
        run: |
          web-ext sign \
            --artifacts-dir dist \
            --api-key "${{ secrets.AMO_API_KEY }}" \
            --api-secret "${{ secrets.AMO_API_SECRET }}" \
            --channel listed
        continue-on-error: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" dist/*.zip --generate-notes --title "${{ github.ref_name }}"
